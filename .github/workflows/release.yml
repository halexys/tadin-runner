name: macOS Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión (ej: v0.1.5)'
        required: true
      environment:
        description: 'Entorno (solo para notificaciones)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      releases_url:
        description: 'URL base de releases (se parchea en tauri.conf.json)'
        required: true
      market_url:
        description: 'URL del marketplace'
        required: true

env:
  TADIN_VERSION: ${{ github.event.inputs.version }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-14
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          repository: empty-nameAI/tadin-service
          ref: ${{ env.TADIN_VERSION }}
          token: ${{ secrets.GH_PAT }}

      - uses: actions/checkout@v4
        with:
          repository: empty-nameAI/tadin-app
          ref: ${{ env.TADIN_VERSION }}
          path: tadin-app
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tadin-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: brew install create-dmg

      - name: Patch version and updater endpoint
        run: |
          VERSION="${{ env.TADIN_VERSION }}"
          VERSION="${VERSION#v}"
          python3 - "$VERSION" "${{ github.event.inputs.releases_url }}" << 'PY'
          import json, sys
          ver, rel_url = sys.argv[1], sys.argv[2]
          f = 'tadin-app/src-tauri/tauri.conf.json'
          d = json.load(open(f))
          d['version'] = ver
          d.setdefault('plugins', {}).setdefault('updater', {})['endpoints'] = [f"{rel_url}/latest.json"]
          json.dump(d, open(f, 'w'), indent=2)
          PY

      - name: Install npm dependencies
        working-directory: tadin-app
        run: npm ci

      - name: Build Tauri (universal macOS)
        working-directory: tadin-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_MARKET_URL: ${{ github.event.inputs.market_url }}
          VITE_RELEASES_URL: ${{ github.event.inputs.releases_url }}
        run: npx tauri build --target universal-apple-darwin

      - name: Locate artifacts
        working-directory: tadin-app
        run: |
          find src-tauri/target -name "*.dmg"          -type f | head -1 | xargs -I{} mv {} "../tadin-macos-universal.dmg"            2>/dev/null || true
          find src-tauri/target -name "*.app.tar.gz"   -type f | head -1 | xargs -I{} mv {} "../tadin-macos-universal.app.tar.gz"     2>/dev/null || true
          find src-tauri/target -name "*.app.tar.gz.sig" -type f | head -1 | xargs -I{} mv {} "../tadin-macos-universal.app.tar.gz.sig" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            tadin-macos-universal.dmg
            tadin-macos-universal.app.tar.gz
            tadin-macos-universal.app.tar.gz.sig
          if-no-files-found: warn

      - name: Notify
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TAGS=$([ "$STATUS" = "success" ] && echo "white_check_mark" || echo "x")
          curl -s \
            -H "Title: macOS — $STATUS (${{ github.event.inputs.environment }})" \
            -H "Tags: $TAGS" \
            -H "Priority: default" \
            -d "Release ${{ env.TADIN_VERSION }} — macOS $STATUS" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}
